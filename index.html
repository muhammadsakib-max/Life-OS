  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

%;max-width:430px;background:#f6f3ec;min-height:100vh;box-shadow:0 0 44px rgba(15,38,32,0.10);position:relative;padding-bottom:122px;box-sizing:border-box;\">\n\n<header data-screen-label=\"Header\" style=\"position:relative;overflow:hidden;background:#0f2620;padding:34px 22px 26px;border-radius:0 0 28px 28px;text-align:center;\">\n  <div style=\"position:absolute;top:-110px;left:50%;transform:translateX(-50%);width:360px;height:260px;background:radial-gradient(circle, rgba(217,180,90,0.30), transparent 65%);pointer-events:none;\"><\u002Fdiv>\n  <div style=\"position:relative;display:flex;justify-content:center;margin-bottom:10px;\">\n    <svg width=\"26\" height=\"26\" sc-camel-view-box=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"9\" style=\"fill:#d9b45a;\"><\u002Fcircle><circle cx=\"15.5\" cy=\"10\" r=\"8\" style=\"fill:#0f2620;\"><\u002Fcircle><\u002Fsvg>\n  <\u002Fdiv>\n  <h1 style=\"position:relative;margin:0;font-family:'Noto Serif Bengali',serif;font-size:26px;font-weight:800;color:#f6f3ec;line-height:1.4;\">Sakib's Daily System<\u002Fh1>\n  <div style=\"position:relative;display:inline-flex;margin-top:10px;padding:6px 15px 7px;border:1px solid rgba(217,180,90,0.42);border-radius:999px;background:rgba(217,180,90,0.10);\">\n    <span style=\"font-family:'Noto Serif Bengali',serif;font-size:13px;font-weight:600;color:#e9c86e;line-height:1.6;\">A perfect day is not the goal — a consistent day is<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"position:relative;margin-top:13px;font-size:13.5px;font-weight:500;color:rgba(246,243,236,0.68);line-height:1.6;\">{{ fullDate }}<\u002Fdiv>\n<\u002Fheader>\n\n<section data-screen-label=\"Today's Routine\" style=\"padding:24px 18px 2px;\">\n  <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin:0 4px 14px;\">\n    <h2 style=\"margin:0;font-family:'Noto Serif Bengali',serif;font-size:15px;font-weight:700;color:#8a6d29;\">Today's Routine<\u002Fh2>\n    <span style=\"font-size:13px;font-weight:600;color:#6f7a72;\">{{ tProgress }} done<\u002Fspan>\n  <\u002Fdiv>\n  <sc-for list=\"{{ timelineItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n    <div style=\"display:flex;gap:12px;\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;width:14px;flex:none;padding-top:24px;\">\n        <div style=\"width:12px;height:12px;flex:none;border-radius:50%;border:2px solid #d9b45a;background:{{ item.nodeBg }};transition:background 0.25s;\"><\u002Fdiv>\n        <div style=\"width:2px;flex:1;background:{{ item.lineBg }};margin-top:4px;border-radius:2px;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <button sc-camel-on-click=\"{{ item.toggle }}\" style=\"appearance:none;-webkit-appearance:none;font-family:inherit;text-align:left;box-sizing:border-box;cursor:pointer;flex:1;min-width:0;display:block;background:{{ item.cardBg }};border:1px solid {{ item.cardBorder }};border-radius:18px;padding:14px 16px 15px;margin:0 0 12px;box-shadow:0 1px 3px rgba(15,38,32,0.05);transition:background 0.25s, border-color 0.25s, transform 0.12s;\" style-active=\"transform:scale(0.985);\">\n        <span style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;\">\n          <span style=\"font-family:'Noto Serif Bengali',serif;font-size:13px;font-weight:700;color:#8a6d29;background:rgba(217,180,90,0.15);border:1px solid rgba(217,180,90,0.35);padding:2px 11px 4px;border-radius:999px;line-height:1.6;\">{{ item.anchor }}<\u002Fspan>\n          <span style=\"width:32px;height:32px;flex:none;box-sizing:border-box;border-radius:50%;border:2px solid {{ item.checkBorder }};background:{{ item.checkBg }};display:flex;align-items:center;justify-content:center;transition:background 0.2s, border-color 0.2s;\">\n            <sc-if value=\"{{ item.checked }}\" hint-placeholder-val=\"{{ false }}\">\n              <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 16 16\" style=\"animation:checkPop 0.35s ease;\"><path d=\"M3 8.5 L6.5 12 L13 4.5\" style=\"stroke:#ffffff;stroke-width:2.6;fill:none;stroke-linecap:round;stroke-linejoin:round;\"><\u002Fpath><\u002Fsvg>\n            <\u002Fsc-if>\n          <\u002Fspan>\n        <\u002Fspan>\n        <span style=\"display:block;font-size:16px;font-weight:600;color:#22332c;line-height:1.6;opacity:{{ item.textOpacity }};transition:opacity 0.25s;\">{{ item.task }}<\u002Fspan>\n        <sc-if value=\"{{ item.sub }}\" hint-placeholder-val=\"{{ false }}\">\n          <span style=\"display:block;margin-top:4px;font-size:13px;font-weight:500;color:#7e8880;line-height:1.6;\">{{ item.sub }}<\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n<\u002Fsection>\n\n<section data-screen-label=\"Daily Scorecard\" style=\"padding:14px 18px 0;\">\n  <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin:0 4px 14px;\">\n    <h2 style=\"margin:0;font-family:'Noto Serif Bengali',serif;font-size:15px;font-weight:700;color:#8a6d29;\">Daily Scorecard<\u002Fh2>\n    <span style=\"font-size:13px;font-weight:600;color:#6f7a72;\">{{ sProgress }}<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"background:#fffdf8;border:1px solid rgba(15,38,32,0.08);border-radius:20px;box-shadow:0 1px 3px rgba(15,38,32,0.05);overflow:hidden;\">\n    <sc-for list=\"{{ scoreItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n      <button sc-camel-on-click=\"{{ item.toggle }}\" style=\"appearance:none;-webkit-appearance:none;font-family:inherit;width:100%;box-sizing:border-box;display:flex;align-items:center;gap:14px;padding:15px 16px;background:{{ item.rowBg }};border:none;border-bottom:{{ item.rowBorder }};cursor:pointer;text-align:left;transition:background 0.2s;\" style-active=\"background:rgba(46,110,94,0.12);\">\n        <span style=\"width:30px;height:30px;flex:none;box-sizing:border-box;border-radius:10px;border:2px solid {{ item.boxBorder }};background:{{ item.boxBg }};display:flex;align-items:center;justify-content:center;transition:background 0.2s, border-color 0.2s;\">\n          <sc-if value=\"{{ item.checked }}\" hint-placeholder-val=\"{{ false }}\">\n            <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 16 16\" style=\"animation:checkPop 0.35s ease;\"><path d=\"M3 8.5 L6.5 12 L13 4.5\" style=\"stroke:#ffffff;stroke-width:2.6;fill:none;stroke-linecap:round;stroke-linejoin:round;\"><\u002Fpath><\u002Fsvg>\n          <\u002Fsc-if>\n        <\u002Fspan>\n        <span style=\"font-size:16.5px;font-weight:600;color:#22332c;flex:1;line-height:1.5;\">{{ item.label }}<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n  <div style=\"margin:8px 6px 0;font-size:12.5px;color:#8b9289;\">At least 3 of 4 makes the day successful<\u002Fdiv>\n  <sc-if value=\"{{ isSuccessToday }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"margin-top:14px;position:relative;overflow:hidden;background:#0f2620;border-radius:18px;padding:18px 18px 19px;text-align:center;animation:riseIn 0.5s cubic-bezier(0.2,0.8,0.3,1);box-shadow:0 8px 24px rgba(15,38,32,0.25);\">\n      <div style=\"position:absolute;inset:0;background:radial-gradient(circle at 50% 0%, rgba(217,180,90,0.32), transparent 62%);animation:glowPulse 3s ease-in-out infinite;\"><\u002Fdiv>\n      <div style=\"position:relative;font-family:'Noto Serif Bengali',serif;font-size:20px;font-weight:800;color:#e9c86e;line-height:1.5;\">Today was a success! ✓<\u002Fdiv>\n      <div style=\"position:relative;margin-top:3px;font-size:13.5px;color:rgba(246,243,236,0.75);line-height:1.6;\">Alhamdulillah — consistency maintained<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fsection>\n\n<section data-screen-label=\"Streak &amp; History\" style=\"padding:26px 18px 0;\">\n  <h2 style=\"margin:0 4px 14px;font-family:'Noto Serif Bengali',serif;font-size:15px;font-weight:700;color:#8a6d29;\">Streak &amp; History<\u002Fh2>\n  <div style=\"background:#fffdf8;border:1px solid rgba(15,38,32,0.08);border-radius:20px;padding:18px 18px 16px;box-shadow:0 1px 3px rgba(15,38,32,0.05);\">\n    <div style=\"display:flex;align-items:center;gap:14px;\">\n      <div style=\"width:52px;height:52px;flex:none;border-radius:50%;background:rgba(217,180,90,0.16);border:1px solid rgba(217,180,90,0.4);display:flex;align-items:center;justify-content:center;\">\n        <svg width=\"26\" height=\"26\" sc-camel-view-box=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"9\" style=\"fill:#b98f33;\"><\u002Fcircle><circle cx=\"16\" cy=\"9.5\" r=\"8\" style=\"fill:#f9f1df;\"><\u002Fcircle><\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"flex:1;min-width:0;\">\n        <div style=\"display:flex;align-items:baseline;gap:8px;\">\n          <span style=\"font-family:'Noto Serif Bengali',serif;font-size:40px;line-height:1.1;font-weight:800;color:#17402f;\">{{ streakBn }}<\u002Fspan>\n          <span style=\"font-size:14px;font-weight:600;color:#6f7a72;\">day streak<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"margin-top:2px;font-size:12.5px;font-weight:500;color:#8b9289;\">Total successful days: {{ allTimeBn }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:18px;\">\n      <sc-for list=\"{{ weekDots }}\" as=\"d\" hint-placeholder-count=\"7\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:7px;\">\n          <span style=\"width:18px;height:18px;box-sizing:border-box;border-radius:50%;background:{{ d.bg }};border:{{ d.border }};box-shadow:{{ d.shadow }};transition:background 0.25s;\"><\u002Fspan>\n          <span style=\"font-size:11px;font-weight:{{ d.labelWeight }};color:{{ d.labelColor }};\">{{ d.label }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"margin-top:16px;background:rgba(46,110,94,0.08);border-radius:12px;padding:10px 13px;\">\n      <span style=\"font-size:13.5px;font-weight:600;color:#2e6e5e;line-height:1.65;\">{{ streakMsg }}<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<sc-if value=\"{{ showWeekly }}\" hint-placeholder-val=\"{{ false }}\">\n  <section data-screen-label=\"Weekly Review\" style=\"padding:26px 18px 0;\">\n    <div style=\"position:relative;overflow:hidden;background:#2e6e5e;border-radius:20px;padding:20px 18px 18px;box-shadow:0 6px 18px rgba(46,110,94,0.22);\">\n      <div style=\"position:absolute;top:-90px;right:-60px;width:220px;height:220px;background:radial-gradient(circle, rgba(217,180,90,0.28), transparent 65%);pointer-events:none;\"><\u002Fdiv>\n      <div style=\"position:relative;font-family:'Noto Serif Bengali',serif;font-size:13px;font-weight:700;color:#efd48a;\">Weekly Review — Jumu'ah Mubarak<\u002Fdiv>\n      <div style=\"position:relative;margin-top:7px;font-family:'Noto Serif Bengali',serif;font-size:22px;font-weight:800;color:#f6f3ec;line-height:1.5;\">{{ weekCountBn }}/7 successful days this week<\u002Fdiv>\n      <input value=\"{{ reflectionText }}\" sc-camel-on-change=\"{{ onReflect }}\" placeholder=\"One line of reflection on this week…\" style=\"position:relative;margin-top:13px;width:100%;box-sizing:border-box;background:rgba(246,243,236,0.10);border:1px solid rgba(246,243,236,0.28);border-radius:12px;padding:12px 14px;font-family:inherit;font-size:14.5px;font-weight:500;color:#f6f3ec;outline:none;\">\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fsc-if>\n\n<footer data-screen-label=\"Footer\" style=\"padding:36px 28px 26px;text-align:center;\">\n  <div style=\"width:26px;height:2px;background:#d9b45a;margin:0 auto 16px;border-radius:2px;\"><\u002Fdiv>\n  <p style=\"margin:0;font-family:'Noto Serif Bengali',serif;font-size:15px;font-weight:600;color:#4a544d;line-height:2;\">“Indeed, Allah does not change the condition of a people until they change what is within themselves”<\u002Fp>\n  <p style=\"margin:10px 0 0;font-size:12.5px;font-weight:700;color:#8a6d29;\">— Surah Ar-Ra'd 13:11<\u002Fp>\n<\u002Ffooter>\n\n<button data-screen-label=\"Emergency Button\" sc-camel-on-click=\"{{ openEmergency }}\" style=\"position:fixed;bottom:14px;left:50%;transform:translateX(-50%);width:min(394px, calc(100% - 32px));z-index:60;box-sizing:border-box;background:#0f2620;border:1.5px solid rgba(217,180,90,0.55);border-radius:999px;padding:15px 20px;cursor:pointer;font-family:'Hind Siliguri',sans-serif;font-size:16px;font-weight:700;color:#e9c86e;box-shadow:0 10px 28px rgba(15,38,32,0.35);display:flex;align-items:center;justify-content:center;gap:10px;transition:box-shadow 0.15s;\" style-hover=\"box-shadow:0 14px 34px rgba(15,38,32,0.5);\" style-active=\"transform:translateX(-50%) scale(0.975);\">\n  <span style=\"width:8px;height:8px;flex:none;border-radius:50%;background:#d9b45a;animation:glowPulse 1.8s ease-in-out infinite;\"><\u002Fspan>\n  Urge rising? Press now\n<\u002Fbutton>\n\n<sc-if value=\"{{ showEmergency }}\" hint-placeholder-val=\"{{ false }}\">\n  <div data-screen-label=\"Emergency Overlay\" style=\"position:fixed;inset:0;z-index:100;background:#0f2620;overflow:auto;animation:fadeIn 0.3s ease;\">\n    <div style=\"position:fixed;top:-130px;left:50%;transform:translateX(-50%);width:480px;height:300px;background:radial-gradient(circle, rgba(217,180,90,0.24), transparent 65%);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"max-width:430px;margin:0 auto;min-height:100%;box-sizing:border-box;padding:42px 26px 32px;display:flex;flex-direction:column;gap:20px;\">\n      <div style=\"text-align:center;\">\n        <div style=\"font-size:13px;font-weight:600;letter-spacing:0.03em;color:rgba(217,180,90,0.9);\">Pause — let this moment pass<\u002Fdiv>\n        <h2 style=\"margin:6px 0 0;font-family:'Noto Serif Bengali',serif;font-size:28px;font-weight:800;color:#f6f3ec;\">Stay calm<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:10px;\">\n        <div style=\"display:flex;align-items:center;gap:13px;background:rgba(246,243,236,0.06);border:1px solid rgba(246,243,236,0.13);border-radius:14px;padding:13px 15px;\">\n          <span style=\"width:28px;height:28px;flex:none;box-sizing:border-box;border:1.5px solid rgba(217,180,90,0.7);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif Bengali',serif;font-size:13px;font-weight:700;color:#e9c86e;\">1<\u002Fspan>\n          <span style=\"font-size:15.5px;font-weight:600;color:#f6f3ec;line-height:1.5;\">Stand up<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:13px;background:rgba(246,243,236,0.06);border:1px solid rgba(246,243,236,0.13);border-radius:14px;padding:13px 15px;\">\n          <span style=\"width:28px;height:28px;flex:none;box-sizing:border-box;border:1.5px solid rgba(217,180,90,0.7);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif Bengali',serif;font-size:13px;font-weight:700;color:#e9c86e;\">2<\u002Fspan>\n          <span style=\"font-size:15.5px;font-weight:600;color:#f6f3ec;line-height:1.5;\">Make wudu<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:13px;background:rgba(246,243,236,0.06);border:1px solid rgba(246,243,236,0.13);border-radius:14px;padding:13px 15px;\">\n          <span style=\"width:28px;height:28px;flex:none;box-sizing:border-box;border:1.5px solid rgba(217,180,90,0.7);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif Bengali',serif;font-size:13px;font-weight:700;color:#e9c86e;\">3<\u002Fspan>\n          <span style=\"font-size:15.5px;font-weight:600;color:#f6f3ec;line-height:1.5;\">2 rak'ah of salah or 20 push-ups<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:16px;margin-top:10px;\">\n        <div style=\"width:148px;height:148px;box-sizing:border-box;border-radius:50%;border:2px solid rgba(217,180,90,0.65);background:rgba(217,180,90,0.06);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:breathe 8s ease-in-out infinite;\">\n          <sc-if value=\"{{ countdownRunning }}\" hint-placeholder-val=\"{{ false }}\">\n            <span style=\"font-family:'Noto Serif Bengali',serif;font-size:42px;font-weight:800;color:#e9c86e;line-height:1.15;\">{{ countdownBn }}<\u002Fspan>\n            <span style=\"font-size:11.5px;font-weight:500;color:rgba(246,243,236,0.6);\">seconds<\u002Fspan>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ countdownDone }}\" hint-placeholder-val=\"{{ false }}\">\n            <span style=\"font-family:'Noto Serif Bengali',serif;font-size:34px;font-weight:800;color:#e9c86e;line-height:1.2;\">✓<\u002Fspan>\n            <span style=\"font-size:12.5px;font-weight:600;color:rgba(246,243,236,0.75);\">Alhamdulillah<\u002Fspan>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <sc-if value=\"{{ countdownRunning }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:14.5px;font-weight:600;color:rgba(246,243,236,0.8);\">{{ breathText }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ countdownDone }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:14.5px;font-weight:600;color:rgba(246,243,236,0.8);text-align:center;line-height:1.7;\">The wave has passed — urges never last.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:10px;margin-top:auto;padding-top:10px;\">\n        <button sc-camel-on-click=\"{{ closeEmergency }}\" style=\"appearance:none;-webkit-appearance:none;width:100%;box-sizing:border-box;background:#f6f3ec;color:#0f2620;border:none;border-radius:999px;padding:15px 20px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:transform 0.12s;\" style-active=\"transform:scale(0.98);\">Alhamdulillah — I'm okay<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ openRelapse }}\" style=\"appearance:none;-webkit-appearance:none;background:transparent;border:none;padding:10px;font-family:inherit;font-size:13.5px;font-weight:600;color:rgba(246,243,236,0.55);text-decoration:underline;cursor:pointer;\">I slipped — I couldn't hold on<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ showRelapse }}\" hint-placeholder-val=\"{{ false }}\">\n  <div data-screen-label=\"The 24-Hour Rule\" style=\"position:fixed;inset:0;z-index:110;background:#f6f3ec;overflow:auto;animation:fadeIn 0.3s ease;\">\n    <div style=\"max-width:430px;margin:0 auto;min-height:100%;box-sizing:border-box;padding:44px 24px 32px;display:flex;flex-direction:column;\">\n      <div style=\"text-align:center;margin-bottom:22px;\">\n        <div style=\"display:flex;justify-content:center;margin-bottom:8px;\">\n          <svg width=\"28\" height=\"28\" sc-camel-view-box=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"9\" style=\"fill:#d9b45a;\"><\u002Fcircle><circle cx=\"15.5\" cy=\"10\" r=\"8\" style=\"fill:#f6f3ec;\"><\u002Fcircle><\u002Fsvg>\n        <\u002Fdiv>\n        <h2 style=\"margin:0 0 8px;font-family:'Noto Serif Bengali',serif;font-size:26px;font-weight:800;color:#22332c;\">The 24-Hour Rule<\u002Fh2>\n        <p style=\"margin:0;font-size:15px;font-weight:500;color:#6f7a72;line-height:1.75;\">A stumble does not end the journey.<br>What matters now is how you return.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:11px;\">\n        <div style=\"background:#fffdf8;border:1px solid rgba(15,38,32,0.09);border-radius:16px;padding:15px 16px;\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:5px;\">\n            <span style=\"width:26px;height:26px;flex:none;box-sizing:border-box;border:1.5px solid #d9b45a;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif Bengali',serif;font-size:12.5px;font-weight:700;color:#8a6d29;\">1<\u002Fspan>\n            <span style=\"font-family:'Noto Serif Bengali',serif;font-size:16.5px;font-weight:700;color:#22332c;\">Make tawbah<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"margin:0 0 0 36px;font-size:13.5px;font-weight:500;color:#6f7a72;line-height:1.7;\">Sincerely ask for forgiveness. Allah loves those who repent — the door is always open.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fffdf8;border:1px solid rgba(15,38,32,0.09);border-radius:16px;padding:15px 16px;\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:5px;\">\n            <span style=\"width:26px;height:26px;flex:none;box-sizing:border-box;border:1.5px solid #d9b45a;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif Bengali',serif;font-size:12.5px;font-weight:700;color:#8a6d29;\">2<\u002Fspan>\n            <span style=\"font-family:'Noto Serif Bengali',serif;font-size:16.5px;font-weight:700;color:#22332c;\">Don't curse yourself<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"margin:0 0 0 36px;font-size:13.5px;font-weight:500;color:#6f7a72;line-height:1.7;\">The shame spiral only feeds the urge. Learn from the slip — no self-hatred.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fffdf8;border:1px solid rgba(15,38,32,0.09);border-radius:16px;padding:15px 16px;\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:5px;\">\n            <span style=\"width:26px;height:26px;flex:none;box-sizing:border-box;border:1.5px solid #d9b45a;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif Bengali',serif;font-size:12.5px;font-weight:700;color:#8a6d29;\">3<\u002Fspan>\n            <span style=\"font-family:'Noto Serif Bengali',serif;font-size:16.5px;font-weight:700;color:#22332c;\">Restart at Fajr tomorrow<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"margin:0 0 0 36px;font-size:13.5px;font-weight:500;color:#6f7a72;line-height:1.7;\">Return to the system within 24 hours. One stumble does not break a habit — quitting does.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:14px;background:rgba(217,180,90,0.13);border:1px solid rgba(217,180,90,0.35);border-radius:14px;padding:12px 15px;\">\n        <span style=\"font-size:13.5px;font-weight:600;color:#7a6224;line-height:1.7;\">Your {{ allTimeBn }} past successful days stay in your history — they were not erased. The streak restarts at zero, but the experience comes with you.<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:10px;margin-top:auto;padding-top:22px;\">\n        <button sc-camel-on-click=\"{{ confirmRelapse }}\" style=\"appearance:none;-webkit-appearance:none;width:100%;box-sizing:border-box;background:#2e6e5e;color:#f6f3ec;border:none;border-radius:999px;padding:15px 20px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:transform 0.12s;\" style-active=\"transform:scale(0.98);\">Tawbah made — fresh start at Fajr tomorrow<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ closeEmergency }}\" style=\"appearance:none;-webkit-appearance:none;background:transparent;border:none;padding:10px;font-family:inherit;font-size:13.5px;font-weight:600;color:#6f7a72;text-decoration:underline;cursor:pointer;\">Take me back — I haven't lost yet<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;showWeeklyReview&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Behavior&quot;},&quot;breathingSeconds&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:120,&quot;min&quot;:30,&quot;max&quot;:120,&quot;step&quot;:10,&quot;unit&quot;:&quot;s&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Behavior&quot;}}\">\nclass Component extends DCLogic {\n  KEY = 'sakiber-dainik-system-v1';\n  TIMELINE = [\n    { anchor: 'Fajr', task: 'Salah + 10 min Quran → Programming Hero module', sub: 'First task of the day — hardest thing first' },\n    { anchor: 'Dhuhr → Asr', task: '1 lesson from a math-heavy course', sub: '' },\n    { anchor: 'Maghrib → Isha', task: 'Theory subject — 1 topic with Claude + NotebookLM', sub: '' },\n    { anchor: 'After Isha', task: 'Write 3 tasks for tomorrow + sleep with phone far away', sub: '' }\n  ];\n  SCORE = ['5 waqt salah?', 'Web dev 1 session?', 'Study 1 session?', 'Stayed away from haram?'];\n\n  state = { store: this.loadStore(), showEmergency: false, showRelapse: false, countdown: null, countdownTotal: 60 };\n\n  loadStore() {\n    try {\n      const raw = localStorage.getItem('sakiber-dainik-system-v1');\n      if (raw) {\n        const p = JSON.parse(raw);\n        return { days: p.days || {}, reflections: p.reflections || {} };\n      }\n    } catch (e) {}\n    return { days: {}, reflections: {} };\n  }\n\n  persist(store) {\n    try { localStorage.setItem(this.KEY, JSON.stringify(store)); } catch (e) {}\n  }\n\n  bn(n) { return String(n); }\n\n  dateKey(d) {\n    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');\n  }\n\n  emptyDay() { return { t: [false, false, false, false], s: [false, false, false, false], relapse: false }; }\n\n  getDayRec(store, key) {\n    const r = store.days[key];\n    return r ? { t: (r.t || []).slice(0, 4), s: (r.s || []).slice(0, 4), relapse: !!r.relapse } : this.emptyDay();\n  }\n\n  mutateToday(fn) {\n    this.setState((st) => {\n      const store = { days: Object.assign({}, st.store.days), reflections: Object.assign({}, st.store.reflections) };\n      const key = this.dateKey(new Date());\n      const rec = this.getDayRec(store, key);\n      fn(rec);\n      store.days[key] = rec;\n      this.persist(store);\n      return { store };\n    });\n  }\n\n  isSuccess(r) { return !!r && !r.relapse && (r.s || []).filter(Boolean).length >= 3; }\n\n  weekId() {\n    const d = new Date();\n    const back = (d.getDay() + 1) % 7; // week starts Saturday\n    const s = new Date(d);\n    s.setDate(d.getDate() - back);\n    return 'w-' + this.dateKey(s);\n  }\n\n  saveReflection(v) {\n    this.setState((st) => {\n      const store = { days: Object.assign({}, st.store.days), reflections: Object.assign({}, st.store.reflections) };\n      store.reflections[this.weekId()] = v;\n      this.persist(store);\n      return { store };\n    });\n  }\n\n  encourage(streak) {\n    if (streak === 0) return 'Every big change starts with one day. Let today be that day, in sha Allah.';\n    if (streak <= 2) return 'Bismillah — the start is done. Now just win tomorrow.';\n    if (streak <= 6) return this.bn(streak) + '-day streak — the habit is taking root. Do not stop.';\n    if (streak <= 13) return 'MashaAllah! A full week — you are proving this is possible.';\n    if (streak <= 29) return 'Over two weeks! Consistency is your identity now.';\n    return 'Over a month — Alhamdulillah. This system is now part of your life.';\n  }\n\n  openEmergency() {\n    const total = Math.round(this.props.breathingSeconds ?? 60);\n    if (this._timer) clearInterval(this._timer);\n    this.setState({ showEmergency: true, showRelapse: false, countdown: total, countdownTotal: total });\n    this._timer = setInterval(() => {\n      this.setState((st) => {\n        if (st.countdown === null) return null;\n        if (st.countdown <= 1) {\n          clearInterval(this._timer);\n          this._timer = null;\n          return { countdown: 0 };\n        }\n        return { countdown: st.countdown - 1 };\n      });\n    }, 1000);\n  }\n\n  closeEmergency() {\n    if (this._timer) { clearInterval(this._timer); this._timer = null; }\n    this.setState({ showEmergency: false, showRelapse: false, countdown: null });\n  }\n\n  openRelapse() {\n    if (this._timer) { clearInterval(this._timer); this._timer = null; }\n    this.setState({ showRelapse: true });\n  }\n\n  confirmRelapse() {\n    this.mutateToday((r) => { r.relapse = true; r.s[3] = false; });\n    if (this._timer) { clearInterval(this._timer); this._timer = null; }\n    this.setState({ showEmergency: false, showRelapse: false, countdown: null });\n  }\n\n  componentWillUnmount() {\n    if (this._timer) clearInterval(this._timer);\n  }\n\n  renderVals() {\n    const now = new Date();\n    const todayKey = this.dateKey(now);\n    const store = this.state.store;\n    const rec = this.getDayRec(store, todayKey);\n\n    const timelineItems = this.TIMELINE.map((def, i) => {\n      const checked = !!rec.t[i];\n      return {\n        anchor: def.anchor,\n        task: def.task,\n        sub: def.sub,\n        checked,\n        toggle: () => this.mutateToday((r) => { r.t[i] = !r.t[i]; }),\n        cardBg: checked ? '#edf4f0' : '#fffdf8',\n        cardBorder: checked ? 'rgba(46,110,94,0.32)' : 'rgba(15,38,32,0.09)',\n        nodeBg: checked ? '#d9b45a' : '#f6f3ec',\n        lineBg: i === this.TIMELINE.length - 1 ? 'transparent' : 'rgba(217,180,90,0.45)',\n        checkBg: checked ? '#2e6e5e' : 'transparent',\n        checkBorder: checked ? '#2e6e5e' : '#c9c2b1',\n        textOpacity: checked ? 0.6 : 1\n      };\n    });\n    const tDone = rec.t.filter(Boolean).length;\n\n    const scoreItems = this.SCORE.map((label, i) => {\n      const checked = !!rec.s[i];\n      return {\n        label,\n        checked,\n        toggle: () => this.mutateToday((r) => { r.s[i] = !r.s[i]; }),\n        rowBg: checked ? 'rgba(46,110,94,0.07)' : 'transparent',\n        rowBorder: i === this.SCORE.length - 1 ? 'none' : '1px solid rgba(15,38,32,0.07)',\n        boxBg: checked ? '#2e6e5e' : 'transparent',\n        boxBorder: checked ? '#2e6e5e' : '#c9c2b1'\n      };\n    });\n    const scoreDone = rec.s.filter(Boolean).length;\n    const isSuccessToday = !rec.relapse && scoreDone >= 3;\n\n    let streak = 0;\n    const cursor = new Date(now);\n    if (!this.isSuccess(store.days[todayKey])) cursor.setDate(cursor.getDate() - 1);\n    for (let i = 0; i < 4000; i++) {\n      const k = this.dateKey(cursor);\n      if (this.isSuccess(store.days[k])) { streak++; cursor.setDate(cursor.getDate() - 1); } else break;\n    }\n\n    let allTime = 0;\n    Object.keys(store.days).forEach((k) => { if (this.isSuccess(store.days[k])) allTime++; });\n\n    const weekDots = [];\n    let weekCount = 0;\n    for (let i = 6; i >= 0; i--) {\n      const d = new Date(now);\n      d.setDate(now.getDate() - i);\n      const r = store.days[this.dateKey(d)];\n      const succ = this.isSuccess(r);\n      if (succ) weekCount++;\n      const isToday = i === 0;\n      let bg = 'transparent';\n      let border = '2px solid #d5cebd';\n      if (r) {\n        if (succ) { bg = '#2e6e5e'; border = '2px solid #2e6e5e'; }\n        else { bg = '#ddd5c3'; border = '2px solid #ddd5c3'; }\n      }\n      let label = '';\n      try { label = new Intl.DateTimeFormat('en', { weekday: 'short' }).format(d); } catch (e) {}\n      weekDots.push({\n        label, bg, border,\n        shadow: isToday ? '0 0 0 2px #fffdf8, 0 0 0 4px #d9b45a' : 'none',\n        labelColor: isToday ? '#8a6d29' : '#8b9289',\n        labelWeight: isToday ? 700 : 500\n      });\n    }\n\n    const streakMsg = rec.relapse\n      ? 'You stumbled today — fresh start at Fajr tomorrow. Allah is Most Forgiving.'\n      : this.encourage(streak);\n\n    let dateLine = '';\n    try { dateLine = new Intl.DateTimeFormat('en', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }).format(now); } catch (e) {}\n    let hijri = '';\n    try { hijri = new Intl.DateTimeFormat('en-u-ca-islamic-umalqura', { day: 'numeric', month: 'long', year: 'numeric' }).format(now); }\n    catch (e) {\n      try { hijri = new Intl.DateTimeFormat('en-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' }).format(now); } catch (e2) {}\n    }\n    const fullDate = hijri ? dateLine + '  •  ' + hijri : dateLine;\n\n    const showWeekly = (this.props.showWeeklyReview ?? false) || now.getDay() === 5;\n    const reflectionText = store.reflections[this.weekId()] || '';\n\n    const countdown = this.state.countdown;\n    const countdownRunning = this.state.showEmergency && countdown !== null && countdown > 0;\n    const countdownDone = this.state.showEmergency && countdown === 0;\n    const elapsed = countdown === null ? 0 : this.state.countdownTotal - countdown;\n    const breathText = (elapsed % 8) < 4 ? 'Breathe in slowly…' : 'Breathe out slowly…';\n\n    return {\n      fullDate,\n      timelineItems,\n      tProgress: tDone + '/4',\n      scoreItems,\n      sProgress: scoreDone + '/4',\n      isSuccessToday,\n      streakBn: this.bn(streak),\n      streakMsg,\n      weekDots,\n      allTimeBn: this.bn(allTime),\n      showWeekly,\n      weekCountBn: this.bn(weekCount),\n      reflectionText,\n      onReflect: (e) => this.saveReflection(e.target.value),\n      showEmergency: this.state.showEmergency,\n      showRelapse: this.state.showRelapse,\n      openEmergency: () => this.openEmergency(),\n      closeEmergency: () => this.closeEmergency(),\n      openRelapse: () => this.openRelapse(),\n      confirmRelapse: () => this.confirmRelapse(),\n      countdownBn: this.bn(countdown === null ? 0 : countdown),\n      countdownRunning,\n      countdownDone,\n      breathText\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
